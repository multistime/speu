name: Deploy to Staging

on:
  push:
    branches:
      - main
      - staging
      - 'feature/**'
      - 'fix/**'

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Link Vercel project (.vercel/ not in git)
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          if [ -z "$VERCEL_PROJECT_ID" ] || [ -z "$VERCEL_ORG_ID" ]; then
            echo "::error::У рэпазіторыі павінны быць сакрэты VERCEL_PROJECT_ID і VERCEL_ORG_ID (гл. AGENTS.md). Без іх vercel pull у CI не знаходзіць праект."
            exit 1
          fi
          mkdir -p .vercel
          node -e "require('fs').writeFileSync('.vercel/project.json', JSON.stringify({ projectId: process.env.VERCEL_PROJECT_ID, orgId: process.env.VERCEL_ORG_ID }))"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment (preview)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Staging
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Staging URL: $URL"

      - name: Assign staging alias (main branch only)
        if: github.ref == 'refs/heads/main'
        run: |
          vercel alias set ${{ steps.deploy.outputs.url }} staging-speu.vercel.app \
            --token=${{ secrets.VERCEL_TOKEN }} || true

      - name: Comment on commit
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const sha = context.sha.substring(0, 7);
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `✅ Staging deployment ready\n\n**URL:** ${url}\n**Commit:** \`${sha}\`\n\nTo promote to production, run the **Promote to Production** workflow.`
            });
